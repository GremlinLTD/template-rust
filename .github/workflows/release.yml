name: Release

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "build.rs"
  workflow_dispatch:
    inputs:
      version:
        description: "Version override (e.g. 1.0.0). Leave empty for auto-increment from commit messages."
        required: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  version:
    name: Bump version
    if: github.actor != 'gremlinltd-release-bot[bot]'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install cocogitto
        run: |
          curl -sSL https://github.com/cocogitto/cocogitto/releases/latest/download/cocogitto-7.0.0-x86_64-unknown-linux-musl.tar.gz | tar xz --strip-components=1 -C /usr/local/bin

      - name: Bump version
        id: bump
        run: |
          git config --global user.name "gremlinltd-release-bot[bot]"
          git config --global user.email "gremlinltd-release-bot[bot]@users.noreply.github.com"
          cog bump ${{ github.event.inputs.version && format('--version {0}', github.event.inputs.version) || '--auto' }}
          VERSION=$(git describe --tags --abbrev=0)
          echo "version=${VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Push tag
        run: |
          git push origin main --tags

  changelog:
    name: Generate changelog
    needs: version
    runs-on: ubuntu-latest
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: main
          token: ${{ steps.app-token.outputs.token }}

      - name: Generate changelog
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72 # v4
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Commit changelog
        run: |
          git config user.name "gremlinltd-release-bot[bot]"
          git config user.email "gremlinltd-release-bot[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          if ! git diff --cached --quiet; then
            git commit -m "docs: update changelog for v${{ needs.version.outputs.version }}"
            git push origin main
          fi

  test:
    name: Test
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: v${{ needs.version.outputs.version }}
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo test --locked

  build:
    name: Build ${{ matrix.target }}
    needs: [version, test]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: v${{ needs.version.outputs.version }}

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          BIN_NAME=$(grep -m1 'name' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          cd target/${{ matrix.target }}/release
          tar czf ../../../${BIN_NAME}-v${{ needs.version.outputs.version }}-${{ matrix.target }}.tar.gz ${BIN_NAME}
          cd ../../..
          if command -v sha256sum > /dev/null; then
            sha256sum ${BIN_NAME}-v${{ needs.version.outputs.version }}-${{ matrix.target }}.tar.gz
          else
            shasum -a 256 ${BIN_NAME}-v${{ needs.version.outputs.version }}-${{ matrix.target }}.tar.gz
          fi > ${BIN_NAME}-v${{ needs.version.outputs.version }}-${{ matrix.target }}.tar.gz.sha256

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $binName = (Select-String -Path Cargo.toml -Pattern 'name\s*=\s*"(.+)"' | Select-Object -First 1).Matches.Groups[1].Value
          Compress-Archive -Path target/${{ matrix.target }}/release/${binName}.exe -DestinationPath ${binName}-v${{ needs.version.outputs.version }}-${{ matrix.target }}.zip
          (Get-FileHash ${binName}-v${{ needs.version.outputs.version }}-${{ matrix.target }}.zip -Algorithm SHA256).Hash.ToLower() + "  ${binName}-v${{ needs.version.outputs.version }}-${{ matrix.target }}.zip" | Out-File -Encoding ascii ${binName}-v${{ needs.version.outputs.version }}-${{ matrix.target }}.zip.sha256

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: build-${{ matrix.target }}
          path: |
            *-v${{ needs.version.outputs.version }}-${{ matrix.target }}.*

  release:
    name: Create release
    needs: [version, build, changelog]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: v${{ needs.version.outputs.version }}

      - name: Generate release notes
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72 # v4
        id: cliff
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          body: ${{ steps.cliff.outputs.content }}
          files: |
            *-v*.*
